<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.9, maximum-scale=1.0, user-scalable=no">
  <title>AI Vision - All-in-One</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 15px; }
    h1 { text-align: center; padding: 15px 0; font-size: 1.3rem; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .load-status { text-align: center; padding: 8px; font-size: 0.8rem; color: #888; }
    .load-status .done { color: #00ff88; }
    .load-status .fail { color: #ff4444; }
    .video-wrap { position: relative; background: #000; border-radius: 12px; overflow: hidden; }
    video { width: 100%; height: auto; display: block; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; pointer-events: none; }
    canvas.tag-active { pointer-events: auto; cursor: crosshair; }
    .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 10; flex-direction: column; gap: 10px; }
    .overlay.hidden { display: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .controls { display: flex; gap: 8px; margin-top: 15px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .btn-start { background: linear-gradient(135deg, #00d4ff, #7b2cbf); color: #fff; }
    .btn-stop { background: #ff4444; color: #fff; }
    .btn-capture { background: #00ff88; color: #000; }
    .btn-switch { background: #ffcc00; color: #000; min-width: 50px; flex: 0; }
    .btn-export { background: #888; color: #fff; }
    .info { margin-top: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px; }
    .info h3 { font-size: 0.85rem; color: #00d4ff; margin-bottom: 8px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .stat { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; text-align: center; }
    .stat .val { font-size: 1.3rem; font-weight: bold; color: #00d4ff; }
    .stat .lbl { font-size: 0.7rem; color: #888; }
    .list { max-height: 200px; overflow-y: auto; margin-top: 8px; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; background: rgba(0,0,0,0.2); border-radius: 4px; margin-bottom: 4px; font-size: 0.8rem; }
    .item .conf { color: #00ff88; }
    .item .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .face-input { margin-top: 10px; }
    .face-input input { width: 100%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; margin-bottom: 8px; }
    .checkbox { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 0.85rem; }
    .dataset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
    .face-card { background: rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; }
    .face-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .face-card .info { padding: 6px; }
    .face-card .info h4 { font-size: 0.75rem; color: #00d4ff; }
    .face-card .info p { font-size: 0.65rem; color: #888; }
    .face-card .actions { display: flex; gap: 4px; padding: 0 6px 6px; }
    .face-card .actions button { flex: 1; padding: 4px; border: none; border-radius: 3px; font-size: 0.65rem; cursor: pointer; }
    .dl-btn { background: #00d4ff; }
    .del-btn { background: #ff4444; color: #fff; }
    .notif { position: fixed; top: 10px; right: 10px; background: #00ff88; color: #000; padding: 8px 15px; border-radius: 6px; font-weight: 600; z-index: 999; transform: translateX(200px); transition: transform 0.3s; }
    .notif.show { transform: translateX(0); }
    .notif.err { background: #ff4444; color: #fff; }
    .joystick-area { position: relative; width: 100%; height: 180px; margin-top: 15px; background: rgba(0,0,0,0.5); border-radius: 12px; border: 2px solid rgba(0,212,255,0.3); touch-action: none; }
    .joystick-base { position: absolute; top: 50%; left: 50%; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); transform: translate(-50%, -50%); }
    .joystick-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #00d4ff, #7b2cbf); transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(0,212,255,0.5); pointer-events: none; }
    .joystick-info { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-size: 0.8rem; color: #00d4ff; }
    .tracking-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ff4444; margin-right: 5px; }
    .tracking-indicator.active { background: #00ff88; box-shadow: 0 0 8px #00ff88; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
    .mode-row { display: flex; gap: 8px; margin-bottom: 15px; }
    .mode-btn { flex: 1; padding: 8px; text-align: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    .mode-btn.active { background: linear-gradient(135deg, #00d4ff, #7b2cbf); border-color: transparent; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Vision - All-in-One</h1>
    <div id="loadStatus" class="load-status">Memuat...</div>

    <div class="mode-row">
      <div class="mode-btn active" data-m="detect">Deteksi</div>
      <div class="mode-btn" data-m="faces">Dataset Wajah</div>
    </div>

    <div id="detectMode">
      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="overlay" id="overlay"><div class="spinner"></div><p id="statusText">Memuat model...</p></div>
      </div>
      <div class="controls">
        <button class="btn btn-start" id="startBtn">Mulai</button>
        <button class="btn btn-stop" id="stopBtn" disabled>Stop</button>
        <button class="btn btn-switch" id="switchBtn">🔄</button>
      </div>
      <div class="info">
        <div class="stats">
          <div class="stat"><div class="val" id="objCount">0</div><div class="lbl">Objek</div></div>
          <div class="stat"><div class="val" id="faceCount">0</div><div class="lbl">Wajah</div></div>
          <div class="stat"><div class="val" id="savedCount">0</div><div class="lbl">Dataset</div></div>
        </div>
        <div id="recogStatus" style="text-align:center;padding:8px;font-size:0.85rem;color:#888;">Recognition: belum ada data</div>
        <div class="face-input" style="margin-top:10px;">
          <input type="text" id="personLabel" placeholder="Label nama wajah (opsional)">
          <div class="checkbox"><input type="checkbox" id="autoSave"><label>Auto-save wajah tiap 3 detik</label></div>
        </div>
        <div class="controls" style="margin-top:8px;">
          <button class="btn btn-capture" id="captureBtn">Capture Wajah</button>
          <button class="btn btn-export" id="exportBtn">Export</button>
        </div>
        <div class="controls" style="margin-top:8px;">
          <button class="btn btn-capture" id="regObjBtn" style="background:#ff00ff;color:#fff;">+ Register Benda Baru</button>
        </div>
        <div class="list" id="detList"></div>
        <div class="joystick-area" id="joystickArea">
          <div class="joystick-base"><div class="joystick-stick" id="joystickStick"></div></div>
          <div class="joystick-info"><span class="tracking-indicator" id="trackingDot"></span><span id="trackingText">No target</span></div>
        </div>
      </div>
    </div>

    <div id="facesMode" style="display:none;">
      <div class="stats">
        <div class="stat"><div class="val" id="totalFaces">0</div><div class="lbl">Wajah</div></div>
        <div class="stat"><div class="val" id="totalPersons">0</div><div class="lbl">Orang</div></div>
        <div class="stat"><div class="val" id="totalTagged">0</div><div class="lbl">Benda</div></div>
      </div>
      <div class="controls" style="margin-top:10px;">
        <button class="btn btn-stop" id="clearAll">Hapus Semua</button>
      </div>
      <div style="margin-top:15px;"><h3 style="font-size:0.85rem;color:#00d4ff;margin-bottom:8px;">Benda Ditag</h3></div>
      <div class="dataset-grid" id="taggedGrid"></div>
      <div style="margin-top:15px;"><h3 style="font-size:0.85rem;color:#00d4ff;margin-bottom:8px;">Dataset Wajah</h3></div>
      <div class="dataset-grid" id="datasetGrid"></div>
    </div>

    <div style="text-align:center;margin-top:15px;"><button id="debugToggle" style="background:none;border:1px solid #333;color:#666;padding:5px 15px;border-radius:4px;cursor:pointer;font-size:0.75rem;">Debug ▼</button></div>
    <div id="debug" style="display:none;background:#111;border-radius:8px;padding:10px;font-family:monospace;font-size:0.7rem;color:#888;max-height:150px;overflow-y:auto;margin-top:10px;">
      <style>#debug .ok{color:#00ff88}#debug .err{color:#ff4444}#debug .warn{color:#ffcc00}</style>
    </div>
  </div>

  <div class="notif" id="notif"></div>

  <!-- Registration Modal -->
  <div id="regModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;">
    <div style="background:#1a1a2e;border-radius:16px;padding:20px;max-width:500px;width:90%;text-align:center;">
      <h3 style="color:#ff00ff;margin-bottom:10px;">Register Benda Baru</h3>
      <p style="color:#888;font-size:0.85rem;margin-bottom:15px;">Arahkan kamera ke benda, lalu ambil 3-5 foto dari berbagai sudut</p>
      <input type="text" id="regObjLabel" placeholder="Nama benda (misal: Kunci Rumah)" style="width:100%;padding:10px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;margin-bottom:15px;font-size:1rem;text-align:center;">
      <div id="regPreview" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:15px;min-height:60px;"></div>
      <div style="display:flex;gap:8px;">
        <button id="regCapture" style="flex:1;padding:12px;background:#ff00ff;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:1rem;">📸 Ambil Foto</button>
        <button id="regSave" style="flex:1;padding:12px;background:#00ff88;color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:1rem;">✓ Simpan</button>
      </div>
      <button id="regCancel" style="margin-top:10px;padding:8px 20px;background:none;border:1px solid #666;color:#888;border-radius:6px;cursor:pointer;">Batal</button>
      <p id="regInfo" style="color:#888;font-size:0.8rem;margin-top:10px;">Foto: 0/3 (min. 3)</p>
    </div>
  </div>

  <script>
    // Wrap everything in try-catch to prevent silent failures
    try {
    // UI handlers
    document.querySelectorAll('.mode-btn').forEach(function(t) {
      t.onclick = function() {
        document.querySelectorAll('.mode-btn').forEach(function(x){x.classList.remove('active');});
        document.getElementById('detectMode').style.display = 'none';
        document.getElementById('facesMode').style.display = 'none';
        t.classList.add('active');
        document.getElementById(t.dataset.m === 'detect' ? 'detectMode' : 'facesMode').style.display = 'block';
      };
    });

    document.getElementById('debugToggle').onclick = function() {
      var d = document.getElementById('debug');
      d.style.display = d.style.display === 'none' ? 'block' : 'none';
    };

    function log(msg, cls) {
      var dbg = document.getElementById('debug');
      if (!dbg) return;
      var d = document.createElement('div');
      d.className = cls || '';
      d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      dbg.appendChild(d); dbg.scrollTop = dbg.scrollHeight;
    }

    function notify(msg, err) {
      var n = document.getElementById('notif');
      if (!n) { alert(msg); return; }
      n.textContent = msg; n.className = 'notif show' + (err ? ' err' : '');
      setTimeout(function() { n.classList.remove('show'); }, 3000);
    }

    // State
    var cocoModel = null, faceLoaded = false;
    var stream = null, running = false;
    var facing = 'environment';
    var dataset = [], lastAutoSave = 0;
    var joystickX = 0, joystickY = 0;
    var initDone = {coco: false, face: false};
    var loadStatus = document.getElementById('loadStatus');
    var taggedObjects = [], matchObjCounter = 0; // Custom tagged objects

    function checkReady() {
      if (initDone.coco && initDone.face) {
        loadStatus.innerHTML = '<span class="done">Semua siap ✓</span>';
        document.getElementById('statusText').textContent = 'Siap!';
      } else if (initDone.coco) {
        loadStatus.innerHTML = 'Loading face model...';
      } else if (initDone.face) {
        loadStatus.innerHTML = 'Loading object model...';
      }
      // Update overlay status text
      if (cocoModel || faceLoaded) {
        document.getElementById('statusText').textContent = 'Siap! Klik Mulai.';
      }
    }

    function loadSaved() {
      try { var s = localStorage.getItem('faceDataset'); if (s) dataset = JSON.parse(s); } catch(e) {}
      try { var s2 = localStorage.getItem('taggedObjects'); if (s2) taggedObjects = JSON.parse(s2); } catch(e) {}
      loadCustomObjects();
      document.getElementById('savedCount').textContent = dataset.length;
      var statusEl = document.getElementById('recogStatus');
      if (statusEl) {
        var hasDesc = dataset.filter(function(d){return d.descriptor;}).length;
        statusEl.textContent = 'Wajah: '+hasDesc+' | Benda custom: '+customObjects.length;
        statusEl.style.color = customObjects.length > 0 ? '#ff00ff' : '#888';
      }
      renderDataset();
    }
    function saveSaved() {
      try { localStorage.setItem('faceDataset', JSON.stringify(dataset)); } catch(e) { notify('Storage penuh!', true); }
    }
    function saveTagged() {
      try { localStorage.setItem('taggedObjects', JSON.stringify(taggedObjects)); } catch(e) {}
    }

    // Model loading timeout - if models don't load within 30s, allow manual start
    var loadTimeout = setTimeout(function() {
      if (!cocoModel && !faceLoaded) {
        log('Model loading timeout - allowing manual start', 'warn');
        notify('Model lambat, coba klik Mulai', true);
      }
    }, 30000);

    // Load COCO-SSD
    try {
      log('Loading TF.js...');
      var tfScript = document.createElement('script');
      tfScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js';
      tfScript.onload = function() {
        log('TF.js loaded', 'ok');
        var cocoScript = document.createElement('script');
        cocoScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js';
        cocoScript.onload = function() {
          log('coco-ssd script loaded', 'ok');
          setTimeout(function() {
            tf.ready().then(function() {
              log('Loading COCO-SSD model...', 'ok');
              return cocoSsd.load();
            }).then(function(m) {
              cocoModel = m; log('COCO-SSD model ready', 'ok'); initDone.coco = true; checkReady();
            }).catch(function(e) { log('COCO load err: '+e.message, 'err'); initDone.coco = true; checkReady(); });
          }, 100);
        };
        cocoScript.onerror = function() { log('COCO CDN fail', 'err'); initDone.coco = true; checkReady(); };
        document.head.appendChild(cocoScript);
      };
      tfScript.onerror = function() { log('TF.js CDN fail', 'err'); initDone.coco = true; checkReady(); };
      document.head.appendChild(tfScript);
    } catch(e) { log('COCO err: '+e.message, 'err'); initDone.coco = true; checkReady(); }

    // Load face-api (basic detection only)
    try {
      log('Loading face-api...');
      var faceScript = document.createElement('script');
      faceScript.src = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js';
      faceScript.onload = function() {
        log('face-api script loaded', 'ok');
        var URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model/';
        faceapi.nets.tinyFaceDetector.loadFromUri(URL).then(function() {
          log('tinyFaceDetector ready', 'ok');
          faceLoaded = true; initDone.face = true; checkReady();
        }).catch(function(e) { log('Face model err: '+e.message, 'err'); initDone.face = true; checkReady(); });
      };
      faceScript.onerror = function() { log('face-api CDN fail', 'err'); initDone.face = true; checkReady(); };
      document.head.appendChild(faceScript);
    } catch(e) { log('Face err: '+e.message, 'err'); initDone.face = true; checkReady(); }

    // Camera - lower resolution for performance
    async function startCam() {
      var video = document.getElementById('video');
      var s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing, width: { ideal: 480 }, height: { ideal: 360 } }, audio: false });
      video.srcObject = s;
      return new Promise(function(resolve) {
        video.onloadedmetadata = function() {
          var c = document.getElementById('canvas');
          c.width = video.videoWidth; c.height = video.videoHeight;
          resolve(s);
        };
      });
    }

    // Detection loop - optimized
    var lastObjs = [], lastFaces = [];
    var detecting = false;
    var uiUpdateCounter = 0;

    async function runDetection() {
      if (detecting || !running) return;
      detecting = true;
      var video = document.getElementById('video');
      if (video.readyState < 2) { detecting = false; return; }

      try {
        var objPromise = cocoModel ? cocoModel.detect(video).then(function(r) {
          if (r.length > 0) log('Objects: '+r.map(function(o){return o.class;}).join(', '), 'ok');
          return r;
        }).catch(function(e){log('obj err:'+e.message,'err');return [];}) : Promise.resolve([]);
        var facePromise = faceLoaded ? (async function(){ try { return await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.3})); } catch(e){ return []; } })() : Promise.resolve([]);

        var results = await Promise.all([objPromise, facePromise]);
        lastObjs = results[0];
        lastFaces = results[1];
      } catch(e) { log('Detect err: '+e.message, 'err'); }
      detecting = false;
    }

    function drawFrame() {
      if (!running) return;
      var video = document.getElementById('video');
      var canvas = document.getElementById('canvas');
      var ctx = canvas.getContext('2d');

      if (video.videoWidth > 0 && canvas.width === 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        log('Canvas init: '+canvas.width+'x'+canvas.height, 'ok');
      }

      if (canvas.width === 0) { requestAnimationFrame(drawFrame); return; }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Test indicator: show COCO status
      if (!cocoModel) {
        ctx.fillStyle = '#ffcc00'; ctx.font = '14px sans-serif';
        ctx.fillText('⏳ COCO-SSD loading...', 10, 20);
      } else if (lastObjs.length === 0 && lastFaces.length === 0) {
        ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 2;
        ctx.strokeRect(10, 10, 100, 30);
        ctx.fillStyle = '#ff0000'; ctx.font = '12px sans-serif';
        ctx.fillText('No objects yet', 15, 30);
      }

      // Scan for custom objects (color-based) - throttled to every 15 frames for performance
      customScanCounter++;
      if (customObjects.length > 0 && canvas.width > 0 && customScanCounter % 15 === 0) {
        scanCustomObjects(canvas, video);
      }

      // Draw custom objects (color-based tracking)
      for (var i = 0; i < lastCustomDetections.length; i++) {
        var co = lastCustomDetections[i];
        ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 3;
        ctx.strokeRect(co.x, co.y, co.w, co.h);
        var lbl = co.label + ' ' + (co.score*100).toFixed(0) + '%';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillStyle = '#ff00ff'; ctx.fillRect(co.x, co.y-18, ctx.measureText(lbl).width+8, 18);
        ctx.fillStyle = '#fff'; ctx.fillText(lbl, co.x+4, co.y-4);
      }

      // Draw selection rectangle
      if (selecting) {
        var sx = Math.min(selStartX, selEndX), sy = Math.min(selStartY, selEndY);
        var sw = Math.abs(selEndX - selStartX), sh = Math.abs(selEndY - selStartY);
        ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(sx, sy, sw, sh);
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(0,255,0,0.1)';
        ctx.fillRect(sx, sy, sw, sh);
        ctx.fillStyle = '#00ff00'; ctx.font = '12px sans-serif';
        ctx.fillText('Drag untuk tag benda...', sx, sy - 5);
      }

      // Draw objects
      var COLORS = {person:'#ff4444',car:'#ffcc00',bicycle:'#ff8800',motorcycle:'#88ff00',bottle:'#ffaa00',cup:'#00ffaa',chair:'#00ff55',tv:'#00ff55',laptop:'#5500ff',cell_phone:'#ff0055'};
      for (var i = 0; i < lastObjs.length; i++) {
        var p = lastObjs[i];
        var x=p.bbox[0], y=p.bbox[1], w=p.bbox[2], h=p.bbox[3];
        var col = COLORS[p.class] || '#00d4ff';
        var isTagged = lastTaggedMatches[i];
        if (isTagged) { col = '#00ff88'; ctx.lineWidth = 4; }
        else { ctx.lineWidth = p.class==='person' ? 4 : 2; }
        ctx.strokeStyle = col;
        ctx.strokeRect(x, y, w, h);
        var lbl = isTagged ? isTagged : (p.class + ' ' + (p.score*100).toFixed(0) + '%');
        ctx.font = 'bold 14px sans-serif';
        ctx.fillStyle = col; ctx.fillRect(x, y-18, ctx.measureText(lbl).width+8, 18);
        ctx.fillStyle = '#000'; ctx.fillText(lbl, x+4, y-4);
      }

      // Draw faces
      var currentLabel = document.getElementById('personLabel').value || '';
      var displayName = lastMatchedLabel || currentLabel;
      for (var i = 0; i < lastFaces.length; i++) {
        var d = lastFaces[i];
        if (!d.box) continue;
        var b = d.box;
        var lbl = displayName ? displayName : 'Face';
        var col = lastMatchedLabel ? '#00ff88' : (currentLabel ? '#00ff88' : '#00d4ff');
        ctx.strokeStyle = col; ctx.lineWidth = 3;
        ctx.strokeRect(b.x, b.y, b.width, b.height);
        ctx.font = 'bold 14px sans-serif';
        ctx.fillStyle = col; ctx.fillRect(b.x, b.y-18, ctx.measureText(lbl).width+8, 18);
        ctx.fillStyle = '#000'; ctx.fillText(lbl, b.x+4, b.y-4);
      }

      // Update UI every 5 frames to reduce DOM thrashing
      uiUpdateCounter++;
      if (uiUpdateCounter % 5 === 0) {
        document.getElementById('objCount').textContent = lastObjs.length;
        document.getElementById('faceCount').textContent = lastFaces.length;

        var items = [];
        for (var i = 0; i < lastObjs.length; i++) {
          var p = lastObjs[i];
          var lbl = lastTaggedMatches[i] || p.class;
          items.push('<div class="item"><span><span class="dot" style="background:'+(lastTaggedMatches[i]?'#00ff88':'#ff4444')+'"></span>'+lbl+'</span><span class="conf">'+(p.score*100).toFixed(0)+'%</span></div>');
        }
        for (var i = 0; i < lastCustomDetections.length; i++) {
          var co = lastCustomDetections[i];
          items.push('<div class="item"><span><span class="dot" style="background:#ff00ff"></span>'+co.label+'</span><span class="conf">'+(co.score*100).toFixed(0)+'%</span></div>');
        }
        for (var i = 0; i < lastFaces.length; i++) {
          items.push('<div class="item"><span><span class="dot" style="background:#00d4ff"></span>'+(currentLabel||'Face')+'</span><span class="conf">'+(lastFaces[i].score*100).toFixed(0)+'%</span></div>');
        }
        document.getElementById('detList').innerHTML = items.join('') || '';

        // Joystick
        var cw = canvas.width || 1, ch = canvas.height || 1;
        var target = lastFaces.length > 0 ? {x:lastFaces[0].box.x+lastFaces[0].box.width/2, y:lastFaces[0].box.y+lastFaces[0].box.height/2} :
                     lastObjs.filter(function(p){return p.class==='person';}).length > 0 ? {x:lastObjs[0].bbox[0]+lastObjs[0].bbox[2]/2, y:lastObjs[0].bbox[1]+lastObjs[0].bbox[3]/2} : null;
        if (target) {
          var tx = (target.x/cw - 0.5) * 2, ty = (target.y/ch - 0.5) * 2;
          joystickX = joystickX * 0.7 + tx * 0.3;
          joystickY = joystickY * 0.7 + ty * 0.3;
          document.getElementById('joystickStick').style.transform = 'translate(calc(-50% + '+joystickX*35+'px), calc(-50% + '+joystickY*35+'px))';
          document.getElementById('trackingDot').classList.add('active');
          document.getElementById('trackingText').textContent = 'Tracking';
        } else {
          joystickX *= 0.8; joystickY *= 0.8;
          document.getElementById('joystickStick').style.transform = 'translate(calc(-50% + '+joystickX*35+'px), calc(-50% + '+joystickY*35+'px))';
          document.getElementById('trackingDot').classList.remove('active');
          document.getElementById('trackingText').textContent = 'No target';
        }
      }

      // Object matching
      matchTaggedObjects(lastObjs);

      // Auto-save
      if (document.getElementById('autoSave').checked && lastFaces.length > 0) {
        var now = Date.now();
        if (now - lastAutoSave >= 3000) { captureFace(lastFaces[0]); lastAutoSave = now; }
      }

      // Face recognition matching (async, runs in background)
      if (faceLoaded && dataset.length > 0) {
        matchFaces();
      }

      requestAnimationFrame(drawFrame);
    }

    // Detection timer - 500ms interval for better performance
    var detectTimerId = null;
    function detectTimer() {
      if (!running) return;
      runDetection();
      detectTimerId = setTimeout(detectTimer, 500);
    }

    async function captureFace(det) {
      var video = document.getElementById('video');
      var b = det.box ? det.box : det.detection.box;
      var pad = 20;
      var fc = document.createElement('canvas');
      fc.width = b.width+pad*2; fc.height = b.height+pad*2;
      fc.getContext('2d').drawImage(video, b.x-pad, b.y-pad, b.width+pad*2, b.height+pad*2, 0, 0, fc.width, fc.height);
      var img = fc.toDataURL('image/jpeg', 0.7);
      var label = document.getElementById('personLabel').value || 'Unknown_' + Date.now().toString().slice(-6);
      // Extract face descriptor for recognition
      var descriptor = null;
      try {
        var detResult = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.3})).withFaceDescriptor();
        if (detResult && detResult.descriptor) {
          descriptor = Array.from(detResult.descriptor);
        }
      } catch(e) { log('Descriptor err: '+e.message, 'err'); }
      dataset.push({ id: Date.now().toString(), label, time: new Date().toISOString(), conf: det.score || det.detection.score, exp: '?', image: img, descriptor: descriptor });
      saveSaved(); document.getElementById('savedCount').textContent = dataset.length;
      notify('Wajah "'+label+'" disimpan!'); renderDataset();
    }

    function euclideanDistance(a, b) {
      var sum = 0;
      for (var i = 0; i < a.length; i++) {
        var diff = a[i] - b[i];
        sum += diff * diff;
      }
      return Math.sqrt(sum);
    }

    var lastMatchedLabel = '', matchCounter = 0;

    async function matchFaces() {
      if (!faceLoaded || dataset.length === 0) { lastMatchedLabel = ''; return; }
      matchCounter++;
      if (matchCounter % 10 !== 0) return;
      try {
        var detResult = await faceapi.detectSingleFace(document.getElementById('video'), new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.3})).withFaceDescriptor();
        if (!detResult || !detResult.descriptor) { lastMatchedLabel = ''; return; }
        var currentDesc = detResult.descriptor;
        var bestMatch = null, bestDist = 0.6;
        for (var i = 0; i < dataset.length; i++) {
          var d = dataset[i];
          if (!d.descriptor || d.descriptor.length !== 128) continue;
          var refDesc = new Float32Array(d.descriptor);
          var dist = euclideanDistance(currentDesc, refDesc);
          if (dist < bestDist) { bestDist = dist; bestMatch = d.label; }
        }
        lastMatchedLabel = bestMatch || '';
        var statusEl = document.getElementById('recogStatus');
        if (statusEl) {
          statusEl.textContent = bestMatch ? '✓ Recognized: ' + bestMatch : '✗ Unknown face';
          statusEl.style.color = bestMatch ? '#00ff88' : '#ff4444';
        }
      } catch(e) { lastMatchedLabel = ''; }
    }

    // Custom object registration & recognition
    var customObjects = [], lastCustomDetections = [];
    var regPhotos = [], regMode = false;

    function saveCustomObjects() {
      try { localStorage.setItem('customObjects', JSON.stringify(customObjects)); } catch(e) {}
    }
    function loadCustomObjects() {
      try { var s = localStorage.getItem('customObjects'); if (s) customObjects = JSON.parse(s); } catch(e) {}
    }

    // Extract feature descriptor from image data
    function extractFeatures(canvas, x, y, w, h) {
      var ctx = canvas.getContext('2d');
      var imgData = ctx.getImageData(x, y, w, h);
      var data = imgData.data;
      var gridSize = 4; // 4x4 grid
      var cellW = Math.floor(w / gridSize), cellH = Math.floor(h / gridSize);
      var features = [];

      for (var gy = 0; gy < gridSize; gy++) {
        for (var gx = 0; gx < gridSize; gx++) {
          var cx = x + gx * cellW, cy = y + gy * cellH;
          var cw = cellW, ch = cellH;
          var r = 0, g = 0, b = 0, brightness = 0, count = 0;
          var edgeSum = 0, edgeCount = 0;

          for (var py = 0; py < ch; py += 2) {
            for (var px = 0; px < cw; px += 2) {
              var idx = ((cy + py) * w + (cx + px)) * 4;
              if (idx + 3 >= data.length) continue;
              r += data[idx]; g += data[idx+1]; b += data[idx+2];
              brightness += (data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114);
              count++;

              // Simple edge detection (difference with right neighbor)
              if (px + 2 < cw) {
                var idx2 = idx + 8;
                if (idx2 + 3 < data.length) {
                  var diff = Math.abs(data[idx] - data[idx2]) + Math.abs(data[idx+1] - data[idx2+1]) + Math.abs(data[idx+2] - data[idx2+2]);
                  edgeSum += diff;
                  edgeCount++;
                }
              }
            }
          }

          if (count > 0) {
            features.push(r/count, g/count, b/count, brightness/count);
          }
          if (edgeCount > 0) {
            features.push(edgeSum/edgeCount);
          }
        }
      }
      return features;
    }

    function featureDistance(f1, f2) {
      if (f1.length !== f2.length) return Infinity;
      var sum = 0;
      for (var i = 0; i < f1.length; i++) {
        var diff = f1[i] - f2[i];
        sum += diff * diff;
      }
      return Math.sqrt(sum / f1.length);
    }

    // Scan frame for custom objects using template matching
    var customScanCounter = 0;

    function scanCustomObjects(canvas, video) {
      lastCustomDetections = [];
      if (customObjects.length === 0) return;
      var cw = canvas.width, ch = canvas.height;

      for (var c = 0; c < customObjects.length; c++) {
        var obj = customObjects[c];
        if (!obj.features || obj.features.length === 0) continue;

        var scanStep = 50;
        var bestDist = Infinity, bestX = 0, bestY = 0;
        var objW = Math.max(40, Math.floor(obj.avgW || 60));
        var objH = Math.max(40, Math.floor(obj.avgH || 60));

        for (var y = 0; y < ch - objH; y += scanStep) {
          for (var x = 0; x < cw - objW; x += scanStep) {
            var feat = extractFeatures(canvas, x, y, objW, objH);
            if (feat.length === 0) continue;

            // Compare against all reference features, take best match
            var minDist = Infinity;
            for (var f = 0; f < obj.features.length; f++) {
              var d = featureDistance(feat, obj.features[f]);
              if (d < minDist) minDist = d;
            }

            if (minDist < bestDist) {
              bestDist = minDist;
              bestX = x;
              bestY = y;
            }
          }
        }

        // Threshold: lower is better (feature distance)
        if (bestDist < 50) {
          var score = 1 - (bestDist / 50);
          lastCustomDetections.push({
            label: obj.label,
            x: bestX, y: bestY,
            w: objW, h: objH,
            score: Math.max(0, score)
          });
        }
      }
    }

    function renderDataset() {
      document.getElementById('totalFaces').textContent = dataset.length;
      document.getElementById('totalPersons').textContent = new Set(dataset.map(function(d){return d.label;})).size;
      document.getElementById('totalTagged').textContent = customObjects.length;
      // Render custom objects
      var cGrid = document.getElementById('taggedGrid');
      if (customObjects.length === 0) { cGrid.innerHTML = '<p style="color:#666;text-align:center;padding:15px;">Belum ada benda custom. Klik "+ Register Benda Baru" untuk mulai.</p>'; }
      else {
        cGrid.innerHTML = customObjects.map(function(o) {
          var thumb = o.photos && o.photos[0] ? '<img src="'+o.photos[0]+'" style="width:100%;aspect-ratio:1;object-fit:cover;">' : '<div style="width:100%;aspect-ratio:1;background:rgba(255,0,255,0.1);display:flex;align-items:center;justify-content:center;font-size:2rem;">📦</div>';
          return '<div class="face-card">'+thumb+'<div class="info"><h4>'+o.label+'</h4><p>'+o.features.length+' referensi</p></div><div class="actions"><button class="del-btn" onclick="delCustom(\''+o.id+'\')">X</button></div></div>';
        }).join('');
      }
      // Render faces
      var grid = document.getElementById('datasetGrid');
      if (dataset.length === 0) { grid.innerHTML = '<p style="color:#666;text-align:center;padding:30px;">Belum ada data. Capture wajah dengan label nama untuk training recognition.</p>'; return; }
      grid.innerHTML = dataset.map(function(f) {
        var hasDesc = f.descriptor ? '✓' : '✗';
        return '<div class="face-card"><img src="'+f.image+'" alt="'+f.label+'"><div class="info"><h4>'+f.label+' <span style="color:'+(f.descriptor?'#00ff88':'#ff4444')+'">['+hasDesc+']</span></h4><p>'+f.exp+' '+(f.conf*100).toFixed(0)+'%</p></div><div class="actions"><button class="dl-btn" onclick="dlFace(\''+f.id+'\')">DL</button><button class="del-btn" onclick="delFace(\''+f.id+'\')">X</button></div></div>';
      }).join('');
    }
    window.dlFace = function(id) { var f=dataset.find(function(d){return d.id===id;}); if(!f)return; var a=document.createElement('a'); a.download='face_'+f.label+'.jpg'; a.href=f.image; a.click(); };
    window.delFace = function(id) { dataset=dataset.filter(function(d){return d.id!==id;}); saveSaved(); document.getElementById('savedCount').textContent=dataset.length; renderDataset(); notify('Dihapus'); };
    window.delTagged = function(id) { taggedObjects=taggedObjects.filter(function(d){return d.id!==id;}); saveTagged(); renderDataset(); notify('Benda dihapus'); };
    window.delCustom = function(id) { customObjects=customObjects.filter(function(d){return d.id!==id;}); saveCustomObjects(); renderDataset(); notify('Benda custom dihapus'); };

    // Buttons
    document.getElementById('startBtn').onclick = async function() {
      if (typeof loadTimeout !== 'undefined') clearTimeout(loadTimeout);
      if (!cocoModel && !faceLoaded) {
        log('Starting without models - they will load in background', 'warn');
      }
      log('Starting - COCO: '+(cocoModel?'ready':'no')+' Face: '+(faceLoaded?'ready':'no'), 'ok');
      try {
        document.getElementById('statusText').textContent = 'Buka kamera...';
        stream = await startCam(); running = true; uiUpdateCounter = 0; matchCounter = 0; customScanCounter = 0;
        document.getElementById('overlay').classList.add('hidden');
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        drawFrame();
        detectTimer();
      } catch(e) { document.getElementById('statusText').textContent = 'Error: ' + e.message; }
    };

    document.getElementById('stopBtn').onclick = function() {
      running = false; if(detectTimerId) clearTimeout(detectTimerId);
      if(stream) stream.getTracks().forEach(function(t){t.stop();});
      document.getElementById('video').srcObject = null;
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('statusText').textContent = 'Siap!';
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('objCount').textContent = '0';
      document.getElementById('faceCount').textContent = '0';
      document.getElementById('detList').innerHTML = '';
      lastObjs = []; lastFaces = []; lastCustomDetections = [];
      customScanCounter = 0;
      joystickX=0; joystickY=0;
      document.getElementById('joystickStick').style.transform = 'translate(-50%, -50%)';
      document.getElementById('trackingDot').classList.remove('active');
      document.getElementById('trackingText').textContent = 'No target';
    };

    document.getElementById('switchBtn').onclick = async function() {
      if (!running) return;
      facing = facing === 'user' ? 'environment' : 'user';
      running = false; if(detectTimerId) clearTimeout(detectTimerId);
      if(stream) stream.getTracks().forEach(function(t){t.stop();});
      stream = await startCam(); running = true; uiUpdateCounter = 0;
      drawFrame();
      detectTimer();
    };

    document.getElementById('captureBtn').onclick = async function() {
      if (!faceLoaded) { notify('Model wajah belum siap', true); return; }
      try {
        var faces = await faceapi.detectAllFaces(document.getElementById('video'), new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.3}));
        if (faces.length > 0) {
          await captureFace(faces[0]);
        } else {
          notify('Tidak ada wajah!', true);
        }
      } catch(e) { notify('Error: '+e.message, true); log('Capture err: '+e.message, 'err'); }
    };

    document.getElementById('exportBtn').onclick = function() {
      if (dataset.length===0) { notify('Kosong!',true); return; }
      var blob=new Blob([JSON.stringify({faces:dataset.map(function(d){var m=Object.assign({},d);delete m.image;return m;})},null,2)],{type:'application/json'});
      var a=document.createElement('a'); a.download='faces_'+Date.now()+'.json'; a.href=URL.createObjectURL(blob); a.click();
      notify('Exported '+dataset.length+' wajah');
    };

    document.getElementById('clearAll').onclick = function() { if(confirm('Hapus semua?')){ dataset=[]; taggedObjects=[]; customObjects=[]; saveSaved(); saveTagged(); saveCustomObjects(); document.getElementById('savedCount').textContent='0'; renderDataset(); notify('Dihapus'); } };

    // Canvas events for custom object selection (legacy, kept for compatibility)
    var selecting = false, selStartX = 0, selStartY = 0, selEndX = 0, selEndY = 0;
    var canvasEl = document.getElementById('canvas');
    canvasEl.onmousedown = function(e) {
      selecting = true;
      var rect = canvasEl.getBoundingClientRect();
      var scaleX = canvasEl.width / rect.width;
      var scaleY = canvasEl.height / rect.height;
      selStartX = (e.clientX - rect.left) * scaleX;
      selStartY = (e.clientY - rect.top) * scaleY;
      selEndX = selStartX; selEndY = selStartY;
    };
    canvasEl.onmousemove = function(e) {
      if (!selecting) return;
      var rect = canvasEl.getBoundingClientRect();
      var scaleX = canvasEl.width / rect.width;
      var scaleY = canvasEl.height / rect.height;
      selEndX = (e.clientX - rect.left) * scaleX;
      selEndY = (e.clientY - rect.top) * scaleY;
    };
    canvasEl.onmouseup = function(e) { selecting = false; };

    // Registration modal handlers
    var regPhotos = [], regMode = false;

    document.getElementById('regObjBtn').onclick = function() {
      if (!running) { notify('Nyalakan kamera dulu!', true); return; }
      regPhotos = [];
      document.getElementById('regObjLabel').value = '';
      document.getElementById('regPreview').innerHTML = '';
      document.getElementById('regInfo').textContent = 'Foto: 0/3 (min. 3)';
      document.getElementById('regModal').style.display = 'flex';
      regMode = true;
    };

    document.getElementById('regCapture').onclick = function() {
      if (!running) return;
      var video = document.getElementById('video');
      var fc = document.createElement('canvas');
      fc.width = 120; fc.height = 120;
      fc.getContext('2d').drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 0, 0, 120, 120);
      var imgData = fc.toDataURL('image/jpeg', 0.5);
      regPhotos.push(imgData);

      // Add preview thumbnail
      var thumb = document.createElement('img');
      thumb.src = imgData;
      thumb.style.cssText = 'width:60px;height:60px;object-fit:cover;border-radius:6px;border:2px solid #ff00ff;';
      document.getElementById('regPreview').appendChild(thumb);
      document.getElementById('regInfo').textContent = 'Foto: '+regPhotos.length+'/3 (min. 3)';
      notify('Foto '+regPhotos.length+' diambil!');
    };

    document.getElementById('regSave').onclick = function() {
      var label = document.getElementById('regObjLabel').value.trim();
      if (!label) { notify('Masukkan nama benda!', true); return; }
      if (regPhotos.length < 3) { notify('Minimal 3 foto!', true); return; }

      // Extract features from each photo
      var features = [];
      var totalW = 0, totalH = 0;
      for (var i = 0; i < regPhotos.length; i++) {
        (function(idx) {
          var img = new Image();
          img.onload = function() {
            var tc = document.createElement('canvas');
            tc.width = img.width; tc.height = img.height;
            tc.getContext('2d').drawImage(img, 0, 0);
            var feat = extractFeatures(tc, 0, 0, img.width, img.height);
            features[idx] = feat;
            totalW += img.width; totalH += img.height;

            // When all photos processed
            if (features.filter(function(f){return f && f.length > 0;}).length === regPhotos.length) {
              customObjects.push({
                id: Date.now().toString(),
                label: label,
                features: features.filter(function(f){return f && f.length > 0;}),
                avgW: totalW / regPhotos.length,
                avgH: totalH / regPhotos.length,
                photos: regPhotos
              });
              saveCustomObjects();
              document.getElementById('regModal').style.display = 'none';
              regMode = false;
              notify('Benda "'+label+'" terdaftar dengan '+regPhotos.length+' foto!');
              renderDataset();
            }
          };
          img.src = regPhotos[idx];
        })(i);
      }
    };

    document.getElementById('regCancel').onclick = function() {
      document.getElementById('regModal').style.display = 'none';
      regMode = false;
    };

    loadSaved();
    log('App initialized successfully', 'ok');
    } catch(e) {
      console.error('Fatal error:', e);
      alert('Error: ' + e.message);
    }
  </script>
</body>
